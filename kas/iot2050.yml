header:
  version: 10
  includes:
    - file: kas-cip.yml
      repo: cip-core
build_system: isar

distro: iot2050-debian
target: iot2050-image-base
machine: iot2050

defaults:
  repos:
    patches:
      repo: meta-iot2050

repos:
  meta-iot2050:

  isar:
    url: https://github.com/ilbers/isar
    refspec: f5a6fdfd9aad49202093aab2158f625429eaf7c5
    layers:
      meta:
    patches:
      01-wic-root-param:
        path: patches/isar/0001-wic-rootfs-u-boot-Set-root-with-source_params.patch
        repo: meta-iot2050

  cip-core:
    url: https://gitlab.com/cip-project/cip-core/isar-cip-core.git
    refspec: c7b1646d8060f75546c7d77ea92e600a350eec83

bblayers_conf_header:
  standard: |
    LCONF_VERSION = "6"
    BBPATH = "${TOPDIR}"
    BBFILES ?= ""

local_conf_header:
  standard: |
    CONF_VERSION = "1"
  crossbuild: |
    ISAR_CROSS_COMPILE = "1"
