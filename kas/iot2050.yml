header:
  version: 14

build_system: isar
distro: iot2050-debian
target: iot2050-image-base
machine: iot2050

defaults:
  repos:
    patches:
      repo: meta-iot2050

repos:
  meta-iot2050:
    layers:
      meta:

  isar:
    url: https://github.com/ilbers/isar
    commit: 33ca03c711e34d38d303ca38c1259cb6c5fe55ef
    layers:
      meta:

  cip-core:
    url: https://gitlab.com/cip-project/cip-core/isar-cip-core.git
    commit: 3cfd7f0c89155419551f6bf430033c5d1ddd80a7

local_conf_header:
  standard: |
    CONF_VERSION = "1"
  crossbuild: |
    ISAR_CROSS_COMPILE = "1"
  ccache: |
    USE_CCACHE = "1"
  compatsupport: |
    ISAR_ENABLE_COMPAT_ARCH = "1"
  root_password: |
    USERS += "root"
    USER_root[password] ??= "root"
    USER_root[flags] ??= "clear-text-password"