[Service]
# Run cockpit on plain HTTP only (no internal TLS).
# TLS is terminated exclusively by nginx (single entry point).
# Avoids double encryption and conflicting certificates.
# Must be paired with --for-tls-proxy so cockpit still treats traffic as HTTPS.
ExecStartPre=
ExecStart=
ExecStart=/usr/lib/cockpit/cockpit-tls --no-tls
