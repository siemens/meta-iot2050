# WebSocket reverse-proxy common settings.
#
# These are the standard nginx WebSocket proxy directives:
#   - proxy_http_version 1.1: WebSocket requires HTTP/1.1 (HTTP/1.0 cannot upgrade).
#   - proxy_buffering off:    WebSocket is bidirectional; buffering breaks real-time
#                             communication and causes connection stalls.
#   - proxy_read/send_timeout 600s: Long-lived connections (Cockpit terminal, logs)
#                                   need generous timeouts; default 60s is too short.
#   - Upgrade / Connection:   Standard WebSocket handshake headers forwarded from
#                             the client to the backend.
#   - X-Forwarded-*:          Standard proxy headers so the backend knows the original
#                             client IP and protocol (HTTPS) for logging and auth.
#
# Reference: https://nginx.org/en/docs/http/websocket.html
proxy_http_version 1.1;
proxy_buffering off;
proxy_read_timeout 600s;
proxy_send_timeout 600s;
proxy_set_header Connection $iot2050_connection_upgrade;
proxy_set_header Host $host;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Host $host;
proxy_set_header X-Forwarded-Proto https;
proxy_set_header X-Real-IP $remote_addr;
