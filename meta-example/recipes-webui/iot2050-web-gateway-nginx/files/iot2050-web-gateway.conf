map $http_upgrade $iot2050_connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    listen [::]:80;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # server_name _ is a catch-all default. The gateway only serves one site,
    # so every Host header is handled the same way.
    server_name _;

    ssl_certificate /etc/iot2050/web-gateway/tls.crt;
    ssl_certificate_key /etc/iot2050/web-gateway/tls.key;
    client_max_body_size 64k;

    location / {
        # The selected mode injects only the backend port. The TLS listener,
        # redirect, and proxy policy stay identical across onboarding/runtime.
        include /etc/nginx/conf.d/iot2050-web-gateway-mode/current.conf;
        include /etc/nginx/conf.d/iot2050-web-gateway-proxy-common.conf;
        proxy_pass http://127.0.0.1:$iot2050_backend_port;
    }
}
